version: "3.9"

services:
  postgres:
    image: postgres:latest
    container_name: postgres_db
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: social_learning
      POSTGRES_USER: hailam
      POSTGRES_PASSWORD: thanhhai
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:

